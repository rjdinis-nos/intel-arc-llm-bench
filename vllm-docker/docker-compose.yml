services:
  vllm:
    # Locally-built Intel XPU image (see `make build`). vLLM publishes no
    # prebuilt XPU image, so this is built from vLLM's docker/Dockerfile.xpu.
    image: ${VLLM_IMAGE:-vllm-xpu:v0.22.0}
    container_name: vllm-server
    ports:
      - "${VLLM_PORT:-8000}:8000"
    environment:
      # Read by huggingface_hub for gated models (Llama, etc.). Optional.
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    # The image's ENTRYPOINT is ["vllm", "serve"]; we only supply the args.
    command: >
      ${MODEL_NAME:-Qwen/Qwen2.5-0.5B-Instruct}
      --dtype ${DTYPE:-bfloat16}
      --host 0.0.0.0
      --port 8000
      --max-model-len ${MAX_MODEL_LEN:-2048}
      --tensor-parallel-size ${TENSOR_PARALLEL_SIZE:-1}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION:-0.9}
      --attention-backend ${ATTENTION_BACKEND:-TRITON_ATTN}
      ${EXTRA_ARGS:-}
    # vLLM uses shared memory for tensor/IPC; the default 64MB is too small.
    shm_size: ${SHM_SIZE:-4gb}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      # Model load + XPU warmup can take minutes; don't mark unhealthy early.
      start_period: 300s
    restart: unless-stopped
    networks:
      - vllm-network

volumes:
  huggingface_cache:
    driver: local

networks:
  vllm-network:
    driver: bridge
